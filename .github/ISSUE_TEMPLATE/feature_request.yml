name: Feature Request
description: Suggest a new tool or improvement
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature or tool you'd like added.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: What are you trying to do that this would help with?
    validations:
      required: true
