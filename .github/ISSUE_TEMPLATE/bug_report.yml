name: Bug Report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Called tool X with params ...
        2. Got error ...
    validations:
      required: true
  - type: input
    id: matlab-version
    attributes:
      label: MATLAB version
      placeholder: R2024b
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Full error message or traceback.
      render: text
